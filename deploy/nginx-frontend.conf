server {
    listen 80;
    server_name demo.ital-truck.com.ua;

    # Certbot додасть SSL автоматично після: certbot --nginx -d demo.ital-truck.com.ua
    root /home/ubuntu/truckmaster_frontend_demo/dist;
    index index.html;

    # React SPA — всі маршрути через index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Кешування статичних assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    access_log /var/log/nginx/demo-frontend-access.log;
    error_log  /var/log/nginx/demo-frontend-error.log;
}
