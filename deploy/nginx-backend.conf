server {
    listen 80;
    server_name api.demo.ital-truck.com.ua;

    # Certbot додасть SSL автоматично після: certbot --nginx -d api.demo.ital-truck.com.ua

    client_max_body_size 20M;

    location / {
        proxy_pass http://unix:/run/gunicorn-demo.sock;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /media/ {
        alias /home/ubuntu/truckmaster_demo/my_iveco_crm/media/;
    }

    location /static/ {
        alias /home/ubuntu/truckmaster_demo/my_iveco_crm/static_root/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    access_log /var/log/nginx/demo-backend-access.log;
    error_log  /var/log/nginx/demo-backend-error.log;
}
