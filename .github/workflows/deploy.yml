name: Deploy Backend to EC2

on:
  push:
    branches:
      - main # Або 'master', залежно від назви вашої головної гілки

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install SSH Key
      uses: shimataro/ssh-key-action@v2
      with:
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        name: id_rsa
        known_hosts: 'just-a-placeholder'

    - name: Adding Known Hosts
      run: ssh-keyscan -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts

    - name: Deploy to Server
      run: |
        ssh ${{ secrets.USERNAME }}@${{ secrets.HOST }} << 'EOF'
          # Переходимо в правильну папку проєкту
          cd /home/ubuntu/truckmaster/my_iveco_crm

          # Завантажуємо останні зміни з гілки main
          git pull origin main

          # Активуємо віртуальне середовище
          source /home/ubuntu/venv/bin/activate

          # Встановлюємо/оновлюємо залежності
          pip install -r requirements.txt

          # Застосовуємо міграції бази даних
          python manage.py migrate

          # Збираємо статичні файли
          python manage.py collectstatic --noinput

          # Перезапускаємо Gunicorn, щоб застосувати зміни
          sudo systemctl restart gunicorn
        EOF
