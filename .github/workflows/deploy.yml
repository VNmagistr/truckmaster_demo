name: Deploy Backend to DigitalOcean

on:
  push:
    branches:
      - main 

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install sshpass
      run: sudo apt-get install -y sshpass

    - name: Deploy to Server
      env:
        SSHPASS: ${{ secrets.DO_PASSWORD }}
      run: |
        sshpass -e ssh -o StrictHostKeyChecking=no ${{ secrets.DO_USERNAME }}@${{ secrets.DO_HOST }} << 'EOF'

          cd /home/ubuntu/truckmaster/my_iveco_crm

          git fetch origin
          git reset --hard origin/main

          # 👇 ВИПРАВЛЕНО ШЛЯХ ДО VENV 👇
          source /home/ubuntu/truckmaster/my_iveco_crm/venv/bin/activate

          pip install -r requirements.txt
          python manage.py migrate
          python manage.py collectstatic --noinput

          sudo systemctl restart gunicorn
          sudo systemctl restart telegram_bot
        EOF