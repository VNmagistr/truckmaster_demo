name: Deploy Backend to DigitalOcean

on:
  push:
    branches:
      - main
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install sshpass
      run: sudo apt-get install -y sshpass

    - name: Deploy to Server
      env:
        SSHPASS: ${{ secrets.DO_PASSWORD }}
      run: |
        sshpass -e ssh -o StrictHostKeyChecking=no ${{ secrets.DO_USERNAME }}@${{ secrets.DO_HOST }} << EOF
          set -e

          echo "📦 Starting deployment..."

          cd /home/ubuntu/truckmaster/my_iveco_crm
          
          # Оновлюємо код з токеном
          echo "🔄 Pulling latest code..."
          git pull https://${{ secrets.GH_TOKEN }}@https://github.com/VNmagistr/truckmaster.git main

          # Активуємо venv
          echo "🐍 Activating virtual environment..."
          source venv/bin/activate

          # Оновлюємо залежності
          echo "📚 Installing dependencies..."
          pip install -r requirements.txt

          # Запускаємо міграції
          echo "🗄️  Running migrations..."
          python manage.py migrate --noinput

          # Збираємо статику
          echo "🎨 Collecting static files..."
          python manage.py collectstatic --noinput

          # Перевірка системи
          echo "✅ Running system check..."
          python manage.py check --deploy

          # Перезапускаємо сервіси
          echo "🔄 Restarting services..."
          sudo systemctl restart gunicorn
          sudo systemctl restart telegram_bot
          sudo systemctl reload nginx

          # Перевірка статусу
          echo "📊 Checking service status..."
          sudo systemctl is-active gunicorn
          sudo systemctl is-active telegram_bot
          
          echo "✅ Deployment completed successfully!"
        EOF

    - name: Verify Deployment
      env:
        SSHPASS: ${{ secrets.DO_PASSWORD }}
      run: |
        sleep 5
        echo "🔍 Verifying deployment..."
        curl -f http://${{ secrets.DO_HOST }}/admin/ || echo "⚠️ Warning: Admin page not responding"