name: Deploy Backend to DigitalOcean

on:
  push:
    branches:
      - main
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install sshpass
      run: sudo apt-get install -y sshpass

    - name: Deploy to Server
      env:
        SSHPASS: ${{ secrets.DO_PASSWORD }}
      run: |
        sshpass -e ssh -o StrictHostKeyChecking=no ${{ secrets.DO_USERNAME }}@${{ secrets.DO_HOST }} << 'EOF'
          set -e  # Зупинити при помилці
          
          echo "📦 Starting deployment..."
          
          cd /home/ubuntu/truckmaster/my_iveco_crm

          # 1. Оновлюємо код
          echo "🔄 Pulling latest code..."
          git fetch origin
          
          # Видаляємо untracked файли міграцій, які можуть конфліктувати
          echo "🧹 Cleaning untracked migration files..."
          git clean -fd */migrations/
          
          git reset --hard origin/main

          # 2. Активуємо venv
          echo "🐍 Activating virtual environment..."
          source venv/bin/activate

          # 3. Оновлюємо залежності
          echo "📚 Installing dependencies..."
          pip install -r requirements.txt

          # 4. Запускаємо міграції
          echo "🗄️  Running migrations..."
          python manage.py migrate --noinput

          # 5. Збираємо статику
          echo "🎨 Collecting static files..."
          python manage.py collectstatic --noinput

          # 6. Перевірка системи
          echo "✅ Running system check..."
          python manage.py check --deploy

          # 7. Перезапускаємо сервіси
          echo "🔄 Restarting services..."
          sudo systemctl restart gunicorn
          sudo systemctl restart telegram_bot
          sudo systemctl reload nginx

          # 8. Перевірка статусу
          echo "📊 Checking service status..."
          sudo systemctl is-active gunicorn
          sudo systemctl is-active telegram_bot
          
          echo "✅ Deployment completed successfully!"
        EOF

    - name: Verify Deployment
      env:
        SSHPASS: ${{ secrets.DO_PASSWORD }}
      run: |
        sleep 5
        echo "🔍 Verifying deployment..."
        curl -f http://${{ secrets.DO_HOST }}/admin/ || echo "⚠️ Warning: Admin page not responding"