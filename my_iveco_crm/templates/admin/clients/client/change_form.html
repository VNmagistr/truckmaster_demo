{% extends "admin/change_form.html" %}

{% block extrahead %}
{{ block.super }}
<style>
/* ── Toggle switches для ClientFeature inline ──────────────────────────── */

/* Приховуємо стандартний checkbox, залишаємо label */
.feature-toggle-row input[type="checkbox"] {
  position: absolute;
  opacity: 0;
  width: 0;
  height: 0;
  pointer-events: none;
}

/* Обгортка одного перемикача */
.feature-toggle-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 6px 0;
}

/* Лейбл-перемикач */
.feature-toggle-label {
  position: relative;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  user-select: none;
}

/* Трек */
.feature-toggle-track {
  position: relative;
  width: 46px;
  height: 26px;
  background: #d0d0d0;
  border-radius: 13px;
  transition: background-color .22s ease;
  flex-shrink: 0;
}

/* Повзунок */
.feature-toggle-thumb {
  position: absolute;
  top: 3px;
  left: 3px;
  width: 20px;
  height: 20px;
  background: #fff;
  border-radius: 50%;
  box-shadow: 0 1px 4px rgba(0,0,0,.25);
  transition: transform .22s ease;
}

/* Стан: увімкнено */
.feature-toggle-label.is-on .feature-toggle-track {
  background: #f5c518;
}
.feature-toggle-label.is-on .feature-toggle-thumb {
  transform: translateX(20px);
}

/* Назва фічі */
.feature-toggle-name {
  font-size: 14px;
  font-weight: 500;
  color: #333;
  min-width: 180px;
}

/* Підказка */
.feature-toggle-hint {
  font-size: 12px;
  color: #999;
}

/* Статус-текст */
.feature-toggle-status {
  font-size: 12px;
  font-weight: 600;
  color: #888;
  min-width: 60px;
}
.feature-toggle-label.is-on .feature-toggle-status {
  color: #c9a000;
}

/* Відступ блоку фічей */
#features-group {
  margin-top: 8px;
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function () {
  // Знаходимо всі checkbox-и в inline ClientFeature
  var inline = document.querySelector('.inline-group');
  if (!inline) return;

  // Назви полів → підписи (беремо з labels у формі)
  var checkboxes = inline.querySelectorAll('input[type="checkbox"]');

  checkboxes.forEach(function (cb) {
    var row = cb.closest('.field-box, .form-row, p, div');
    if (!row) return;

    var label = document.querySelector('label[for="' + cb.id + '"]');
    var name = label ? label.textContent.trim() : cb.name;
    var hint = '';

    // Шукаємо help_text
    var helpEl = row.querySelector('.help');
    if (helpEl) hint = helpEl.textContent.trim();

    // Будуємо toggle
    var wrap = document.createElement('div');
    wrap.className = 'feature-toggle-wrap feature-toggle-row';

    var lbl = document.createElement('label');
    lbl.className = 'feature-toggle-label' + (cb.checked ? ' is-on' : '');
    lbl.setAttribute('for', cb.id);

    lbl.innerHTML =
      '<span class="feature-toggle-track"><span class="feature-toggle-thumb"></span></span>' +
      '<span class="feature-toggle-name">' + name + '</span>' +
      '<span class="feature-toggle-status">' + (cb.checked ? 'Увімкнено' : 'Вимкнено') + '</span>';

    // Оновлюємо вигляд при кліку
    lbl.addEventListener('click', function () {
      // Даємо браузеру перемкнути checkbox, потім оновлюємо UI
      setTimeout(function () {
        if (cb.checked) {
          lbl.classList.add('is-on');
          lbl.querySelector('.feature-toggle-status').textContent = 'Увімкнено';
        } else {
          lbl.classList.remove('is-on');
          lbl.querySelector('.feature-toggle-status').textContent = 'Вимкнено';
        }
      }, 10);
    });

    wrap.appendChild(cb.cloneNode());  // невидимий checkbox залишається в DOM
    wrap.appendChild(lbl);

    if (hint) {
      var hintEl = document.createElement('span');
      hintEl.className = 'feature-toggle-hint';
      hintEl.textContent = hint;
      wrap.appendChild(hintEl);
    }

    // Замінюємо оригінальний вміст рядка
    row.innerHTML = '';
    row.appendChild(cb);  // оригінальний checkbox (невидимий)
    row.appendChild(lbl);
  });
});
</script>
{% endblock %}
