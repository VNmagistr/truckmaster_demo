{% extends "admin/change_form.html" %}

{% block extrahead %}
{{ block.super }}
<style>
/* ── Toggle switch ──────────────────────────────────────────────────────── */
.ft-label {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  user-select: none;
  padding: 4px 0;
}
.ft-track {
  position: relative;
  flex-shrink: 0;
  width: 46px;
  height: 26px;
  border-radius: 13px;
  background: var(--ft-off, #bbb);
  transition: background .2s;
}
.ft-thumb {
  position: absolute;
  top: 3px;
  left: 3px;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: var(--ft-thumb, #fff);
  box-shadow: 0 1px 3px rgba(0,0,0,.3);
  transition: transform .2s;
}
.ft-label.on .ft-track { background: #f5c518; }
.ft-label.on .ft-thumb { transform: translateX(20px); }

.ft-name {
  font-size: 14px;
  font-weight: 500;
  color: var(--ft-fg, #333);
  min-width: 210px;
}
.ft-status {
  font-size: 12px;
  font-weight: 600;
  color: var(--ft-muted, #999);
}
.ft-label.on .ft-status { color: #c9a000; }

.ft-help {
  font-size: 12px;
  color: var(--ft-muted, #999);
  margin: 2px 0 6px 58px;
}

/* ── Темна тема (Django 4.2+ data-theme + media fallback) ────────────── */
[data-theme="dark"],
[data-theme="auto"] {
  --ft-off:   #555;
  --ft-thumb: #ddd;
  --ft-fg:    #ddd;
  --ft-muted: #888;
}
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    --ft-off:   #555;
    --ft-thumb: #ddd;
    --ft-fg:    #ddd;
    --ft-muted: #888;
  }
}
.ft-label.on .ft-thumb {
  background: #fff;
}
[data-theme="dark"] .ft-label.on .ft-thumb,
[data-theme="auto"] .ft-label.on .ft-thumb {
  background: #1a1a1a;
}
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) .ft-label.on .ft-thumb {
    background: #1a1a1a;
  }
}
[data-theme="dark"] .ft-label.on .ft-status,
[data-theme="auto"] .ft-label.on .ft-status {
  color: #f5c518;
}
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) .ft-label.on .ft-status {
    color: #f5c518;
  }
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function () {
  document.querySelectorAll('.inline-group .form-row').forEach(function (row) {
    var cb = row.querySelector('input[type="checkbox"]');
    if (!cb) return;

    var origLabel = document.querySelector('label[for="' + cb.id + '"]');
    if (!origLabel) return;

    var name    = origLabel.textContent.replace(/:$/, '').trim();
    var helpEl  = row.querySelector('.help, .helptext');
    var hint    = helpEl ? helpEl.textContent.trim() : '';
    var checked = cb.checked;

    /* ── Повністю ховаємо оригінальні елементи ── */
    cb.style.cssText        = 'position:absolute;clip:rect(0 0 0 0);width:1px;height:1px;overflow:hidden;';
    origLabel.style.display = 'none';
    if (helpEl) helpEl.style.display = 'none';

    /* ── Будуємо toggle ── */
    var lbl = document.createElement('label');
    lbl.className     = 'ft-label' + (checked ? ' on' : '');
    lbl.setAttribute('for', cb.id);
    lbl.innerHTML =
      '<span class="ft-track"><span class="ft-thumb"></span></span>' +
      '<span class="ft-name">' + name + '</span>' +
      '<span class="ft-status">' + (checked ? 'Увімкнено' : 'Вимкнено') + '</span>';

    lbl.addEventListener('click', function () {
      setTimeout(function () {
        lbl.classList.toggle('on', cb.checked);
        lbl.querySelector('.ft-status').textContent = cb.checked ? 'Увімкнено' : 'Вимкнено';
      }, 10);
    });

    /* ── Вставляємо у внутрішній контейнер рядка ── */
    var inner = row.querySelector(':scope > div') || row;
    inner.appendChild(lbl);

    if (hint) {
      var p = document.createElement('p');
      p.className   = 'ft-help';
      p.textContent = hint;
      inner.appendChild(p);
    }
  });
});
</script>
{% endblock %}
