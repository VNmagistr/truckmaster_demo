{% extends "admin/change_form.html" %}

{% block extrahead %}
{{ block.super }}
<style>
/* ── Toggle switches для ClientFeature inline ──────────────────────────── */

.feature-toggle-label {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  user-select: none;
  margin: 4px 0;
}

.feature-toggle-track {
  position: relative;
  width: 46px;
  height: 26px;
  background: #d0d0d0;
  border-radius: 13px;
  transition: background-color .22s ease;
  flex-shrink: 0;
}

.feature-toggle-thumb {
  position: absolute;
  top: 3px;
  left: 3px;
  width: 20px;
  height: 20px;
  background: #fff;
  border-radius: 50%;
  box-shadow: 0 1px 4px rgba(0,0,0,.25);
  transition: transform .22s ease;
}

.feature-toggle-label.is-on .feature-toggle-track { background: #f5c518; }
.feature-toggle-label.is-on .feature-toggle-thumb { transform: translateX(20px); }

.feature-toggle-name {
  font-size: 14px;
  font-weight: 500;
  color: #333;
  min-width: 200px;
}

.feature-toggle-status {
  font-size: 12px;
  font-weight: 600;
  color: #aaa;
  min-width: 64px;
}
.feature-toggle-label.is-on .feature-toggle-status { color: #c9a000; }
</style>

<script>
document.addEventListener('DOMContentLoaded', function () {
  // Шукаємо всі inline-групи ClientFeature
  document.querySelectorAll('.inline-group').forEach(function (group) {

    group.querySelectorAll('input[type="checkbox"]').forEach(function (cb) {

      // 1. Знаходимо оригінальний <label> для цього checkbox
      var origLabel = document.querySelector('label[for="' + cb.id + '"]');
      if (!origLabel) return;

      var name = origLabel.textContent.replace(/:$/, '').trim();

      // 2. Повністю ховаємо оригінальний checkbox і його label
      cb.style.cssText = 'position:absolute;opacity:0;width:0;height:0;pointer-events:none;';
      origLabel.style.display = 'none';

      // 3. Ховаємо help-текст (покажемо окремо під toggleм)
      var fieldBox = cb.closest('.field-box');
      var helpEl = fieldBox ? fieldBox.querySelector('.help') : null;
      if (helpEl) helpEl.style.display = 'none';

      // 4. Будуємо toggle-label
      var toggle = document.createElement('label');
      toggle.className = 'feature-toggle-label' + (cb.checked ? ' is-on' : '');
      toggle.setAttribute('for', cb.id);
      toggle.innerHTML =
        '<span class="feature-toggle-track"><span class="feature-toggle-thumb"></span></span>' +
        '<span class="feature-toggle-name">' + name + '</span>' +
        '<span class="feature-toggle-status">' + (cb.checked ? 'Увімкнено' : 'Вимкнено') + '</span>';

      // 5. Оновлюємо вигляд після кліку (браузер перемикає cb сам)
      toggle.addEventListener('click', function () {
        setTimeout(function () {
          var on = cb.checked;
          toggle.classList.toggle('is-on', on);
          toggle.querySelector('.feature-toggle-status').textContent = on ? 'Увімкнено' : 'Вимкнено';
        }, 10);
      });

      // 6. Вставляємо toggle одразу після прихованого checkbox
      cb.parentNode.insertBefore(toggle, cb.nextSibling);

      // 7. Повертаємо help-текст під toggle
      if (helpEl) {
        var newHelp = document.createElement('p');
        newHelp.className = 'help';
        newHelp.style.cssText = 'margin:2px 0 8px 58px;font-size:12px;color:#999;';
        newHelp.textContent = helpEl.textContent;
        toggle.parentNode.insertBefore(newHelp, toggle.nextSibling);
      }
    });
  });
});
</script>
{% endblock %}
