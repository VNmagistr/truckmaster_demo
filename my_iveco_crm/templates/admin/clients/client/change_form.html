{% extends "admin/change_form.html" %}

{% block extrahead %}
{{ block.super }}
<style>
/* ── Hide the real checkbox (visually only, still submitted) ── */
.ft-cb {
  position: absolute !important;
  width: 1px !important;
  height: 1px !important;
  margin: -1px !important;
  padding: 0 !important;
  overflow: hidden !important;
  clip: rect(0,0,0,0) !important;
  white-space: nowrap !important;
  border: 0 !important;
}

/* ── Toggle label ── */
.ft-label {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  user-select: none;
  padding: 4px 0;
}

/* ── Track (pill) ── */
.ft-track {
  position: relative;
  flex-shrink: 0;
  width: 46px;
  height: 26px;
  border-radius: 13px;
  background: #bbb;
  transition: background .2s;
}

/* ── Thumb (circle) ── */
.ft-thumb {
  position: absolute;
  top: 3px;
  left: 3px;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: #fff;
  box-shadow: 0 1px 3px rgba(0,0,0,.3);
  transition: transform .2s;
}

/* ── ON state ── */
.ft-label.on .ft-track  { background: #f5c518; }
.ft-label.on .ft-thumb  { transform: translateX(20px); }

/* ── Status text ── */
.ft-status {
  font-size: 12px;
  font-weight: 600;
  color: #999;
}
.ft-label.on .ft-status { color: #b89000; }

/* ── Dark theme (Django uses data-theme attribute) ── */
[data-theme="dark"] .ft-track               { background: #555; }
[data-theme="dark"] .ft-label.on .ft-track  { background: #f5c518; }
[data-theme="dark"] .ft-thumb               { background: #e0e0e0; }
[data-theme="dark"] .ft-label.on .ft-thumb  { background: #fff; }
[data-theme="dark"] .ft-status              { color: #777; }
[data-theme="dark"] .ft-label.on .ft-status { color: #b89000; }

/* ── Auto dark (system preference) ── */
@media (prefers-color-scheme: dark) {
  [data-theme="auto"] .ft-track               { background: #555; }
  [data-theme="auto"] .ft-label.on .ft-track  { background: #f5c518; }
  [data-theme="auto"] .ft-thumb               { background: #e0e0e0; }
  [data-theme="auto"] .ft-label.on .ft-thumb  { background: #fff; }
  [data-theme="auto"] .ft-status              { color: #777; }
  [data-theme="auto"] .ft-label.on .ft-status { color: #b89000; }
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function () {
  document.querySelectorAll('.ft-cb').forEach(function (cb) {
    var lbl = document.querySelector('.ft-label[for="' + cb.id + '"]');
    if (!lbl) return;
    cb.addEventListener('change', function () {
      lbl.classList.toggle('on', cb.checked);
      lbl.querySelector('.ft-status').textContent = cb.checked ? 'Увімкнено' : 'Вимкнено';
    });
  });
});
</script>
{% endblock %}
